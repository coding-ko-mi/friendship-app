# =============================================================================
# nginx.conf — конфигурация для friendship-app.
#
# Логика:
#   :80  → редирект на :443 (кроме ACME-challenge для certbot)
#   :443 → TLS, затем:
#           /api/v1/   → API (uvicorn в контейнере api:8000)
#           /webhook   → API (aiogram webhook endpoint)
#           /          → статика фронта (dist/index.html + assets)
# =============================================================================

events {
    # Максимум одновременных соединений на воркер.
    # 1024 с запасом для 50 пользователей закрытого теста.
    worker_connections 1024;
}

http {
    # Типы файлов для правильных Content-Type заголовков.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Эффективная отдача статики (sendfile + tcp_nopush).
    sendfile on;
    tcp_nopush on;

    # Таймаут keep-alive соединений (секунд).
    keepalive_timeout 65;

    # Не показывать версию nginx в заголовках (минимальная безопасность).
    server_tokens off;

    # Буферы для проксирования на uvicorn.
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # -------------------------------------------------------------------------
    # HTTP → HTTPS редирект
    # Исключение: /.well-known/acme-challenge/ — certbot проверяет домен по HTTP.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name YOUR_DOMAIN;  # <-- заменить на реальный домен в рунбуке

        # ACME-challenge: certbot кладёт файл сюда, Let's Encrypt забирает по HTTP.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всё остальное — редирект на HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS сервер
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;  # <-- заменить на реальный домен в рунбуке

        # TLS-сертификаты от Let's Encrypt (certbot кладёт сюда).
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # Только современные протоколы (TLS 1.2+ по рекомендации Mozilla).
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS: браузер запомнит, что домен всегда HTTPS (1 год).
        add_header Strict-Transport-Security "max-age=31536000" always;

        # ---- Статика фронта ----
        # Корень — собранный dist/ React-приложения.
        root /var/www/frontend/dist;
        index index.html;

        # SPA-роутинг: все неизвестные пути → index.html (React Router обработает).
        # Исключения — реальные файлы (JS/CSS/картинки) и API.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- API (FastAPI) ----
        # Все запросы /api/v1/ уходят на uvicorn в контейнере api.
        # Имя api — это имя сервиса в docker-compose, Docker DNS резолвит его.
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Таймауты для долгих операций (регистрация, создание компании).
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ---- Webhook бота (aiogram) ----
        # Telegram шлёт POST /webhook — пробрасываем на отдельный bot-контейнер,
        # который слушает aiohttp на :8080 (WEBHOOK_PORT в env). API на :8000 —
        # это совсем другой процесс (uvicorn для Mini App), у него /webhook нет.
        # Имя bot — это имя сервиса в docker-compose.yml, Docker DNS его резолвит.
        location /webhook {
            proxy_pass http://bot:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Telegram при setWebhook(secret_token=...) шлёт его обратно в этом
            # заголовке — пробрасываем, чтобы aiogram мог проверить.
            proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
        }

        # ---- Health check nginx (опционально, для мониторинга) ----
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
        }
    }
}
